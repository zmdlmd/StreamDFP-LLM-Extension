          <text x="1246" y="328" text-anchor="middle" font-size="16" fill="#4b6174">Recall / ACC</text>

          <rect x="1170" y="390" width="152" height="138" rx="22" fill="#fff" stroke="#2d936c" stroke-width="2.5"/>
          <text x="1246" y="438" text-anchor="middle" font-size="21" font-weight="700" fill="#163043">Policy</text>
          <text x="1246" y="468" text-anchor="middle" font-size="18" fill="#2d936c">llm_enabled</text>
          <text x="1246" y="498" text-anchor="middle" font-size="18" fill="#4b6174">or fallback</text>

          <line x1="198" y1="301" x2="286" y2="301" stroke="#163043" stroke-width="4.5" marker-end="url(#arrow-flow)"/>
          <line x1="470" y1="301" x2="582" y2="301" stroke="#163043" stroke-width="4.5" marker-end="url(#arrow-flow)"/>
          <line x1="766" y1="301" x2="878" y2="301" stroke="#163043" stroke-width="4.5" marker-end="url(#arrow-flow)"/>
          <line x1="1062" y1="301" x2="1170" y2="301" stroke="#163043" stroke-width="4.5" marker-end="url(#arrow-flow)"/>
          <line x1="1246" y1="342" x2="1246" y2="390" stroke="#2d936c" stroke-width="4.5" marker-end="url(#arrow-flow)"/>

          <path d="M 970 528 C 970 616, 674 656, 382 656 C 270 656, 172 632, 110 576" fill="none" stroke="#375a7f" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-flow)"/>
          <rect x="446" y="700" width="456" height="56" rx="18" fill="#ffffff" opacity="0.96" stroke="#d9e0e7"/>
          <text x="674" y="724" text-anchor="middle" font-size="18" fill="#375a7f" font-weight="700">
            <tspan x="674" dy="0">Same downstream predictor as the</tspan>
            <tspan x="674" dy="22">no-LLM baseline</tspan>
          </text>

          <rect x="258" y="558" width="238" height="108" rx="20" fill="#f9e4e6" stroke="#bc4b51" stroke-width="2.5"/>
          <text x="377" y="596" text-anchor="middle" font-size="22" font-weight="700" fill="#bc4b51">mc1 diagnosis</text>
          <text x="377" y="620" text-anchor="middle" font-size="16" fill="#7f3840">
            <tspan x="377" dy="0">Failure traced to faulty</tspan>
            <tspan x="377" dy="18">input sampling</tspan>
          </text>
          <path d="M 377 558 C 377 522, 377 506, 377 492" fill="none" stroke="#bc4b51" stroke-width="4" marker-end="url(#arrow-red)"/>
        </svg>