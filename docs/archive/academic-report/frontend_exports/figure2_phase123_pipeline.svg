          <text x="970" y="434" text-anchor="middle" font-size="18" fill="#4b6174">compact9</text>
          <text x="970" y="462" text-anchor="middle" font-size="18" fill="#4b6174">compact14</text>
          <text x="970" y="490" text-anchor="middle" font-size="18" fill="#4b6174">full70</text>

          <rect x="1170" y="224" width="152" height="118" rx="22" fill="#fff" stroke="#2d936c" stroke-width="2.5"/>
          <text x="1246" y="272" text-anchor="middle" font-size="20" font-weight="700" fill="#163043">
