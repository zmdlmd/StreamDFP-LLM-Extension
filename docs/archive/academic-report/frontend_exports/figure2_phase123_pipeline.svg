          <text x="674" y="116" text-anchor="middle" font-size="26" font-weight="700" fill="#163043">Phase 2</text>
          <text x="970" y="116" text-anchor="middle" font-size="26" font-weight="700" fill="#163043">Phase 3</text>
          <text x="1246" y="178" text-anchor="middle" font-size="26" font-weight="700" fill="#163043">Decision</text>

          <rect x="60" y="224" width="138" height="154" rx="22" fill="#fff" stroke="#375a7f" stroke-width="2.5"/>
          <text x="129" y="282" text-anchor="middle" font-size="19" font-weight="700" fill="#163043">
            <tspan x="129" dy="0">Windowed</tspan>
            <tspan x="129" dy="28">SMART</tspan>
            <tspan x="129" dy="28">records</tspan>
          </text>

          <rect x="286" y="164" width="184" height="126" rx="24" fill="#fff" stroke="#c97b2a" stroke-width="2.5"/>
          <text x="378" y="214" text-anchor="middle" font-size="21" font-weight="700" fill="#163043">
            <tspan x="378" dy="0">Structured</tspan>
            <tspan x="378" dy="30">summarization</tspan>
          </text>
          <text x="378" y="272" text-anchor="middle" font-size="16" fill="#4b6174">summary_text</text>

          <rect x="286" y="352" width="184" height="140" rx="24" fill="#fff" stroke="#c97b2a" stroke-width="2.5"/>
          <text x="378" y="402" text-anchor="middle" font-size="22" font-weight="700" fill="#163043">Artifacts</text>
          <text x="378" y="434" text-anchor="middle" font-size="18" fill="#4b6174">summary_text</text>
          <text x="378" y="462" text-anchor="middle" font-size="18" fill="#4b6174">reference_pool</text>

          <rect x="582" y="164" width="184" height="138" rx="24" fill="#fff" stroke="#c97b2a" stroke-width="2.5"/>
          <text x="674" y="214" text-anchor="middle" font-size="21" font-weight="700" fill="#163043">
