<svg xmlns="http://www.w3.org/2000/svg" id="fig-phase-flow" viewBox="0 0 1400 800" role="img" aria-label="Phase 1 to Phase 3 dataflow" style="font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;"><rect x="0" y="0" width="1400" height="800" fill="#ffffff"/>
          <defs>
            <marker id="arrow-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#163043"/>
            </marker>
            <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#bc4b51"/>
            </marker>
          </defs>

          <rect x="34" y="130" width="190" height="448" rx="28" fill="#e8eff6"/>
          <rect x="252" y="70" width="252" height="576" rx="30" fill="#f8ecdd"/>
          <rect x="548" y="70" width="252" height="576" rx="30" fill="#f8ecdd"/>
          <rect x="844" y="70" width="252" height="576" rx="30" fill="#f8ecdd"/>
          <rect x="1134" y="130" width="224" height="448" rx="28" fill="#e6f3ee"/>

          <text x="129" y="178" text-anchor="middle" font-size="26" font-weight="700" fill="#163043">Input</text>
