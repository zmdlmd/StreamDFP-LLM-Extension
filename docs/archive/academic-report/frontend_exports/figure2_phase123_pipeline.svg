            <tspan x="674" dy="30">extraction</tspan>
          </text>
          <text x="674" y="264" text-anchor="middle" font-size="15" fill="#4b6174">
            <tspan x="674" dy="0">cause, events,</tspan>
            <tspan x="674" dy="17">confidence</tspan>
          </text>

          <rect x="582" y="352" width="184" height="176" rx="24" fill="#fff" stroke="#c97b2a" stroke-width="2.5"/>
          <text x="674" y="400" text-anchor="middle" font-size="22" font-weight="700" fill="#163043">Semantic cache</text>
          <text x="674" y="434" text-anchor="middle" font-size="18" fill="#4b6174">cache_*.jsonl</text>
          <text x="674" y="462" text-anchor="middle" font-size="18" fill="#4b6174">z_llm_*</text>
          <text x="674" y="490" text-anchor="middle" font-size="18" fill="#4b6174">llm_q_score</text>

